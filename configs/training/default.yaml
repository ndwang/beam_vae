epochs: 500
batch_size: 256
num_workers: 8
lr: 5.0e-4
weight_decay: 1.0e-4
beta: 0.0
loss_type: mse
grad_clip: 1.0
val_split: 0.1
seed: 42

scheduler:
  name: reduce_on_plateau
  factor: 0.5
  patience: 10

# Checkpointing
checkpoint_freq: 50  # Save checkpoint every N epochs (in addition to best)

# W&B logging
wandb:
  enabled: false          # Master switch
  project: "beam-vae"     # W&B project name
  entity: null        # W&B team/username (null = default)
  offline: true           # Default true for NERSC (sync later from login node)
  tags: []                # Optional tags
  notes: null             # Optional description
